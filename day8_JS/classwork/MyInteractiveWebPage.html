<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
<script>
	function sayWelcome() {
		document.append("<b><font color='green'>Welcome to JavaScript</font></b>");
	}

	function sayHello() {
		var name = "Neeraj";
		alert("Hello " + name);
	}
</script>
</head>
<body>
	<button onclick="sayWelcome()">Welcome</button> 
	<button onclick="sayHello()">Say Hello</button>
	<input type="button" onclick="sayHello()" value="sayHello" />

</body>
</html>
