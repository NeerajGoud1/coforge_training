<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Grid Layout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>

<div class="container mt-2">

    <div class="row mb-3">
        <div class="col-md-9">
            <div class="bg-primary text-dark text-center rounded-4 py-2">
                <h1 class="display-2 fw-bold">Header</h1>
            </div>
        </div>
    </div>

    <div class="row mb-4">

        <div class="col-md-3 mb-3">
            <div class="bg-success text-dark rounded-5 d-flex justify-content-center align-items-center"
                 style="height:250px;">
                <h1>Column 1</h1>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="bg-warning text-dark rounded-5 d-flex justify-content-center align-items-center"
                 style="height:250px; background-color:orange !important;">
                <h1>Column 2</h1>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="bg-warning text-dark rounded-5 d-flex justify-content-center align-items-center"
                 style="height:250px;">
                <h1>Column 3</h1>
            </div>
        </div>

    </div>


    <div class="row">
        <div class="col-md-9"">
            <div class="bg-primary bg-opacity-75 text-dark text-center rounded-3 py-2">
                <h2 class="fw-bold">Footer</h2>
            </div>
        </div>
    </div>

</div>

</body>
</html>
