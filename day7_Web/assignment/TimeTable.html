<!DOCTYPE html>
<html>
<head>
    <title>Time Table</title>
<style>
body{
    font-family: Arial, sans-serif;
    background-color: white;
}

table{
    border-collapse: collapse;
    width: 70%;
    margin: 80px auto;
}

table, th, td{
    border: 1px solid black;
}

th, td{
    padding: 12px;
    text-align: center;
}

.title{
font-size : 20;
}

</style>
</head>
<body>

    <table border=2>
        <tr>
            <th colspan="6" class="title">Time Table</th>
        </tr>

        <tr>
            <th rowspan="6">Hours</th>
            <th>Mon</th>
            <th>Tue</th>
            <th>Wed</th>
            <th>Thu</th>
            <th>Fri</th>
        </tr>

        <tr>
            <td>Science</td>
            <td>Maths</td>
            <td>Science</td>
            <td>Maths</td>
            <td>Arts</td>
        </tr>

        <tr>
            <td>Science</td>
            <td>Maths</td>
            <td>Science</td>
            <td>Maths</td>
            <td>Arts</td>
        </tr>

        <tr>
            <th colspan="5">LUNCH</th>
        </tr>

        <tr>
            <td>Science</td>
            <td>Maths</td>
            <td>Science</td>
            <td>Maths</td>
            <td rowspan="2">Project</td>
        </tr>

        <tr>
            <td>Science</td>
            <td>Maths</td>
            <td>Science</td>
            <td>Maths</td>
        </tr>

    </table>

</body>
</html>
